<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="러닝로그">
  <meta name="theme-color" content="#0d0d0d">
  <title>러닝 → Notion</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --surface3: #252525;
      --border: #2a2a2a;
      --accent: #60c8f0;
      /* blue — running theme */
      --accent2: #f060a0;
      /* pink — heart rate */
      --accent3: #f0a060;
      --text: #f0f0e8;
      --muted: #666;
      --danger: #f06060;
      --radius: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(var(--safe-top) + 28px) 18px calc(var(--safe-bottom) + 32px);
      background-image:
        radial-gradient(ellipse 70% 40% at 85% 5%, rgba(96, 200, 240, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 5% 95%, rgba(240, 96, 160, 0.05) 0%, transparent 60%);
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 480px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .app-icon {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 0 28px rgba(96, 200, 240, 0.3);
    }

    .header-text h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
      line-height: 1.1;
    }

    .header-text h1 span {
      color: var(--accent);
    }

    .header-text p {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }

    #creds-badge {
      display: none;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      background: rgba(96, 200, 240, 0.1);
      border: 1px solid rgba(96, 200, 240, 0.25);
      color: var(--accent);
      padding: 2px 7px;
      border-radius: 20px;
      margin-left: 4px;
    }

    #install-banner {
      display: none;
      width: 100%;
      max-width: 480px;
      background: rgba(96, 200, 240, 0.07);
      border: 1px solid rgba(96, 200, 240, 0.2);
      border-radius: 10px;
      padding: 11px 14px;
      margin-bottom: 14px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--accent);
      line-height: 1.6;
    }

    /* ── Steps ── */
    .steps {
      display: flex;
      gap: 6px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 20px;
    }

    .step {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      transition: background 0.3s;
    }

    .step.active {
      background: var(--accent);
    }

    .step.done {
      background: var(--accent2);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    label {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      margin-bottom: 5px;
      display: block;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: #444;
    }

    .field-gap {
      margin-top: 12px;
    }

    .toggle-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .toggle-pw {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      padding: 0;
    }

    .save-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .save-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
    }

    /* ── Capture ── */
    #capture-grid {
      margin-bottom: 14px;
    }

    .capture-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
    }

    .capture-btn:active {
      border-color: var(--accent);
      background: rgba(96, 200, 240, 0.06);
    }

    .capture-btn input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
    }

    .capture-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 6px;
    }

    .capture-label {
      font-size: 13px;
      font-weight: 700;
      display: block;
    }

    .capture-sub {
      font-size: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      display: block;
      margin-top: 2px;
    }

    #preview-img {
      width: 100%;
      border-radius: 10px;
      max-height: 280px;
      object-fit: contain;
      background: var(--surface2);
      display: none;
      margin-bottom: 10px;
    }

    .retake-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 6px 12px;
      cursor: pointer;
      margin-bottom: 12px;
      display: none;
    }

    .retake-btn:active {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── Review card ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .stat-box label {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-box input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      padding: 4px 0;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      -webkit-appearance: none;
      outline: none;
      width: 100%;
    }

    .stat-box input:focus {
      border-bottom-color: var(--accent);
    }

    .stat-box .unit {
      font-size: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 4px;
      display: block;
    }

    /* accent colours per stat */
    .stat-distance input {
      color: var(--accent);
    }

    .stat-bpm input {
      color: var(--accent2);
    }

    .stat-time input {
      color: #f0e060;
    }

    .stat-date input {
      font-size: 14px;
    }

    /* converted value display */
    .converted {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      margin-top: 4px;
    }

    .converted span {
      color: var(--accent3);
    }

    /* title preview */
    .title-preview {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .title-preview .title-label {
      font-size: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    .title-preview .title-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 2px;
    }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 22px;
      border-radius: 10px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.18s;
      width: 100%;
      margin-top: 14px;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d0d0d;
    }

    .btn-primary:active:not(:disabled) {
      background: #40a8d0;
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* ── Status ── */
    .status-bar {
      display: none;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      margin-top: 10px;
      align-items: center;
      gap: 10px;
      line-height: 1.5;
    }

    .status-bar.info {
      display: flex;
      background: rgba(96, 200, 240, 0.1);
      border: 1px solid rgba(96, 200, 240, 0.3);
      color: var(--accent);
    }

    .status-bar.success {
      display: flex;
      background: rgba(96, 240, 160, 0.1);
      border: 1px solid rgba(96, 240, 160, 0.3);
      color: #60f0a0;
    }

    .status-bar.error {
      display: flex;
      background: rgba(240, 96, 96, 0.1);
      border: 1px solid rgba(240, 96, 96, 0.3);
      color: var(--danger);
    }

    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .sep {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    .hint {
      font-size: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      line-height: 1.7;
      margin-top: 10px;
    }

    .hint a {
      color: var(--accent);
      text-decoration: none;
    }

    .notion-link {
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      text-decoration: none;
    }

    /* result row */
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      margin-top: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 12px;
      font-family: 'DM Mono', monospace;
    }

    .result-row.ok {
      border-color: rgba(96, 200, 240, 0.3);
    }

    .result-row.fail {
      border-color: rgba(240, 96, 96, 0.3);
      color: var(--danger);
    }

    .result-row a {
      color: var(--accent);
      text-decoration: none;
      font-size: 11px;
    }
  </style>
</head>

<body>

  <header>
    <div class="app-icon">🏃</div>
    <div class="header-text">
      <h1>러닝 <span>→</span> Notion</h1>
      <p>// Garmin 훈련 기록 자동 저장 <span id="creds-badge">✓ 저장됨</span></p>
    </div>
  </header>

  <div id="install-banner">
    📲 Safari → <strong>공유 ↑</strong> → "홈 화면에 추가"로 앱처럼 사용하세요
  </div>

  <div class="steps">
    <div class="step active" id="step1"></div>
    <div class="step" id="step2"></div>
    <div class="step" id="step3"></div>
  </div>

  <!-- ① Config -->
  <div class="card" id="config-card">
    <div class="card-title">① 설정</div>
    <div>
      <label>Notion Integration Token</label>
      <input type="password" id="notion-token" placeholder="secret_xxxxxxxxxxxx" autocomplete="off" />
      <div class="toggle-row"><button class="toggle-pw" onclick="togglePw()">표시 / 숨기기</button></div>
    </div>
    <div class="field-gap">
      <label>Gemini API Key</label>
      <input type="password" id="gemini-key" placeholder="AIzaSy-xxxxxxxxxxxx" autocomplete="off" />
    </div>
    <div class="field-gap">
      <label>Database ID</label>
      <input type="text" id="notion-db" placeholder="러닝 DB의 32자리 코드" autocomplete="off" />
    </div>
    <div class="save-row">
      <input type="checkbox" id="save-creds" checked />
      <label for="save-creds" style="margin:0;font-size:12px;color:var(--muted)">이 기기에 저장</label>
    </div>
    <p class="hint">
      Gemini Key: <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> (무료)
    </p>
  </div>

  <!-- ② Upload -->
  <div class="card" id="upload-card">
    <div class="card-title">② Garmin 결과 이미지 업로드</div>
    <img id="preview-img" alt="러닝 결과 미리보기" />
    <button class="retake-btn" id="retake-btn" onclick="retake()">↩ 다시 선택</button>
    <div id="capture-grid">
      <div class="capture-btn">
        <input type="file" id="file-library" accept="image/*" />
        <span class="capture-icon">📊</span>
        <span class="capture-label">Garmin 결과 선택</span>
        <span class="capture-sub">앨범에서 운동 요약 이미지 선택</span>
      </div>
    </div>
    <button class="btn btn-primary" id="scan-btn" disabled onclick="scanImage()">
      ✦ AI로 기록 분석
    </button>
    <div class="status-bar" id="scan-status"></div>
  </div>

  <!-- ③ Review & Save -->
  <div class="card" id="data-card" style="display:none">
    <div class="card-title">③ 기록 확인 및 저장</div>

    <!-- Title preview -->
    <div class="title-preview">
      <div>
        <div class="title-label">페이지 제목</div>
        <div class="title-value" id="title-preview">——</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div class="title-label">생성일시</div>
        <div style="font-size:13px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:4px" id="date-preview">
          ——</div>
      </div>
    </div>

    <div class="stats-grid">
      <!-- Distance -->
      <div class="stat-box stat-distance">
        <label>거리 (km)</label>
        <input type="text" id="field-distance" inputmode="decimal" placeholder="0.00"
          oninput="run.distance=this.value" />
        <span class="unit">kilometers</span>
      </div>

      <!-- BPM -->
      <div class="stat-box stat-bpm">
        <label>평균 심박수 (bpm)</label>
        <input type="text" id="field-bpm" inputmode="numeric" placeholder="0" oninput="run.bpm=this.value" />
        <span class="unit">beats / min</span>
      </div>

      <!-- Elapsed time -->
      <div class="stat-box stat-time" style="grid-column:1/-1">
        <label>총 시간 → 소요시간(초)</label>
        <input type="text" id="field-time" placeholder="29:56 또는 1:23:45" oninput="onTimeInput(this.value)" />
        <div class="converted">→ <span id="seconds-preview">—</span> 초</div>
      </div>

      <!-- Date (read-only, derived) -->
      <div class="stat-box stat-date" style="grid-column:1/-1">
        <label>날짜 (YYYY-MM-DD)</label>
        <input type="text" id="field-date" placeholder="2026-03-03"
          oninput="run.date=this.value; updateDerivedFields()" />
        <span class="unit">연도는 현재 연도로 자동 설정됨</span>
      </div>
    </div>

    <div class="sep"></div>
    <button class="btn btn-primary" id="save-btn" onclick="saveToNotion()">
      ✦ Notion에 저장
    </button>
    <div id="result-area"></div>
    <div class="status-bar" id="save-status"></div>
  </div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let fileBase64 = null;
    let fileType = null;
    let run = { distance: '', bpm: '', timeRaw: '', seconds: 0, date: '' };

    // ── Credential persistence ─────────────────────────────────────────────
    function loadCreds() {
      try {
        const t = localStorage.getItem('run_token');
        const d = localStorage.getItem('run_db');
        const g = localStorage.getItem('run_gemini');
        if (t) document.getElementById('notion-token').value = t;
        if (d) document.getElementById('notion-db').value = d;
        if (g) document.getElementById('gemini-key').value = g;
        if (t || d || g) document.getElementById('creds-badge').style.display = 'inline';
      } catch (e) { }
    }

    function saveCreds() {
      if (!document.getElementById('save-creds').checked) return;
      try {
        localStorage.setItem('run_token', document.getElementById('notion-token').value.trim());
        localStorage.setItem('run_db', document.getElementById('notion-db').value.trim());
        localStorage.setItem('run_gemini', document.getElementById('gemini-key').value.trim());
        document.getElementById('creds-badge').style.display = 'inline';
      } catch (e) { }
    }

    loadCreds();

    if (!window.matchMedia('(display-mode: standalone)').matches && !navigator.standalone) {
      document.getElementById('install-banner').style.display = 'block';
    }

    // ── Helpers ────────────────────────────────────────────────────────────
    function togglePw() {
      const t = document.getElementById('notion-token');
      t.type = t.type === 'password' ? 'text' : 'password';
    }

    function setStep(n) {
      ['step1', 'step2', 'step3'].forEach((id, i) => {
        document.getElementById(id).className =
          'step' + (i < n - 1 ? ' done' : i === n - 1 ? ' active' : '');
      });
    }

    function showStatus(id, type, html, spin = false) {
      const el = document.getElementById(id);
      el.className = 'status-bar ' + type;
      el.innerHTML = (spin ? '<div class="spinner"></div>' : '') + `<span>${html}</span>`;
    }

    // ── Time conversion ────────────────────────────────────────────────────
    // Accepts MM:SS or HH:MM:SS → total seconds
    function timeToSeconds(str) {
      const parts = str.trim().split(':').map(Number);
      if (parts.some(isNaN)) return null;
      if (parts.length === 2) return parts[0] * 60 + parts[1];          // MM:SS
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2]; // HH:MM:SS
      return null;
    }

    function onTimeInput(val) {
      run.timeRaw = val;
      const secs = timeToSeconds(val);
      run.seconds = secs;
      document.getElementById('seconds-preview').textContent =
        secs !== null ? secs.toLocaleString() : '형식 오류';
    }

    // ── Date → title (YYMMDD) ──────────────────────────────────────────────
    function dateToTitle(dateStr) {
      // dateStr: YYYY-MM-DD
      const m = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return '';
      return m[1].slice(2) + m[2] + m[3]; // YYMMDD
    }

    function updateDerivedFields() {
      const date = document.getElementById('field-date').value.trim();
      const title = dateToTitle(date);
      document.getElementById('title-preview').textContent = title || '——';
      document.getElementById('date-preview').textContent = date || '——';
    }

    // ── File handling ──────────────────────────────────────────────────────
    document.getElementById('file-library').addEventListener('change', function () {
      if (this.files[0]) handleFile(this.files[0]);
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const dataUrl = e.target.result;
        fileBase64 = dataUrl.split(',')[1];
        fileType = file.type || 'image/jpeg';

        const img = document.getElementById('preview-img');
        img.src = dataUrl; img.style.display = 'block';
        document.getElementById('capture-grid').style.display = 'none';
        document.getElementById('retake-btn').style.display = 'inline-block';
        document.getElementById('scan-btn').disabled = false;
        setStep(2);
      };
      reader.readAsDataURL(file);
    }

    function retake() {
      fileBase64 = null; fileType = null;
      run = { distance: '', bpm: '', timeRaw: '', seconds: 0, date: '' };
      document.getElementById('preview-img').style.display = 'none';
      document.getElementById('capture-grid').style.display = 'block';
      document.getElementById('retake-btn').style.display = 'none';
      document.getElementById('scan-btn').disabled = true;
      document.getElementById('scan-status').className = 'status-bar';
      document.getElementById('data-card').style.display = 'none';
      document.getElementById('file-library').value = '';
      setStep(1);
    }

    // ── Scan ───────────────────────────────────────────────────────────────
    async function scanImage() {
      const token = document.getElementById('notion-token').value.trim();
      const dbId = document.getElementById('notion-db').value.trim();
      const apiKey = document.getElementById('gemini-key').value.trim();
      if (!token || !dbId || !apiKey) {
        showStatus('scan-status', 'error', '⚠ 설정값을 모두 입력해주세요.');
        return;
      }
      if (!fileBase64) return;
      saveCreds();

      document.getElementById('scan-btn').disabled = true;
      showStatus('scan-status', 'info', 'Garmin 기록을 분석하는 중…', true);

      const currentYear = new Date().getFullYear();

      const prompt = `This is a Garmin running activity summary screenshot (Korean UI).
The current year is ${currentYear}. The image may not show the year explicitly — always use ${currentYear}.

Extract these fields:
- distance_km: total distance as a decimal number (e.g. 5.35)
- avg_bpm: average heart rate as integer (e.g. 141). Look for "평균 심박수" or "bpm"
- elapsed_time: total elapsed time as string in MM:SS or HH:MM:SS format (e.g. "29:56" or "1:23:45"). Look for "총 시간"
- date: the run date in YYYY-MM-DD format. Look for the date near the top (e.g. "3월 3일" → "${currentYear}-03-03")

Respond ONLY with a JSON object, no markdown:
{
  "distance_km": 5.35,
  "avg_bpm": 141,
  "elapsed_time": "29:56",
  "date": "${currentYear}-MM-DD"
}`;

      try {
        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [
                  { inline_data: { mime_type: fileType, data: fileBase64 } },
                  { text: prompt }
                ]
              }],
              generationConfig: { temperature: 0.1 }
            })
          }
        );

        const data = await res.json();
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

        const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());

        // Populate state
        run.distance = String(parsed.distance_km ?? '');
        run.bpm = String(parsed.avg_bpm ?? '');
        run.timeRaw = parsed.elapsed_time ?? '';
        run.date = parsed.date ?? '';
        run.seconds = timeToSeconds(run.timeRaw);

        // Populate fields
        document.getElementById('field-distance').value = run.distance;
        document.getElementById('field-bpm').value = run.bpm;
        document.getElementById('field-time').value = run.timeRaw;
        document.getElementById('field-date').value = run.date;
        document.getElementById('seconds-preview').textContent =
          run.seconds !== null ? run.seconds.toLocaleString() : '—';
        updateDerivedFields();

        document.getElementById('data-card').style.display = 'block';
        document.getElementById('data-card').scrollIntoView({ behavior: 'smooth' });
        showStatus('scan-status', 'success', '✓ 기록 분석 완료! 확인 후 저장하세요.');
        setStep(3);

      } catch (err) {
        showStatus('scan-status', 'error', '✗ ' + err.message);
        document.getElementById('scan-btn').disabled = false;
      }
    }

    // ── Save to Notion ─────────────────────────────────────────────────────
    async function saveToNotion() {
      const token = document.getElementById('notion-token').value.trim();
      const dbId = document.getElementById('notion-db').value.trim().replace(/-/g, '');
      const NOTION_PROXY = 'https://wandering-term-460f.siksicking.workers.dev';

      // Read latest field values (user may have edited)
      run.distance = document.getElementById('field-distance').value.trim();
      run.bpm = document.getElementById('field-bpm').value.trim();
      run.timeRaw = document.getElementById('field-time').value.trim();
      run.date = document.getElementById('field-date').value.trim();
      run.seconds = timeToSeconds(run.timeRaw);

      const title = dateToTitle(run.date);

      if (!title) {
        showStatus('save-status', 'error', '⚠ 날짜 형식이 올바르지 않습니다 (YYYY-MM-DD).');
        return;
      }

      document.getElementById('save-btn').disabled = true;
      showStatus('save-status', 'info', 'Notion에 저장 중…', true);

      const props = {
        // Page title = YYMMDD
        "날짜": { "title": [{ "text": { "content": title } }] }
      };

      // 생성일시 → date field
      if (run.date && /^\d{4}-\d{2}-\d{2}$/.test(run.date))
        props["생성일시"] = { "date": { "start": run.date } };

      // 거리(km) → number
      const dist = parseFloat(run.distance);
      if (!isNaN(dist)) props["거리(km)"] = { "number": dist };

      // 심박수(bpm) → number
      const bpm = parseInt(run.bpm);
      if (!isNaN(bpm)) props["심박수(bpm)"] = { "number": bpm };

      // 소요시간(초) → number
      if (run.seconds !== null && run.seconds > 0)
        props["소요시간(초)"] = { "number": run.seconds };

      try {
        const res = await fetch(`${NOTION_PROXY}/v1/pages`, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Notion-Version': '2022-06-28',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ parent: { database_id: dbId }, properties: props })
        });

        const result = await res.json();
        if (result.object === 'error') throw new Error(result.message);

        document.getElementById('result-area').innerHTML = `
      <div class="result-row ok">
        <span>✓ ${title} 저장 완료</span>
        <a href="${result.url}" target="_blank">↗ 열기</a>
      </div>`;

        showStatus('save-status', 'success', '✓ Notion 페이지가 생성되었습니다!');
        const btn = document.getElementById('save-btn');
        btn.textContent = '+ 새 기록 등록';
        btn.disabled = false;
        btn.onclick = resetAll;

      } catch (err) {
        showStatus('save-status', 'error', '✗ ' + err.message);
        document.getElementById('save-btn').disabled = false;
      }
    }

    // ── Reset ──────────────────────────────────────────────────────────────
    function resetAll() {
      retake();
      document.getElementById('result-area').innerHTML = '';
      document.getElementById('save-status').className = 'status-bar';
      document.getElementById('title-preview').textContent = '——';
      document.getElementById('date-preview').textContent = '——';
      document.getElementById('seconds-preview').textContent = '—';
      ['field-distance', 'field-bpm', 'field-time', 'field-date']
        .forEach(id => document.getElementById(id).value = '');
      const btn = document.getElementById('save-btn');
      btn.textContent = '✦ Notion에 저장';
      btn.onclick = saveToNotion;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
